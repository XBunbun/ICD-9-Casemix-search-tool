<script>
let database = [];

// Automatically load CSV from root folder
fetch("icd9_procedure.csv")  // Make sure your CSV is in the root
  .then(response => response.text())
  .then(csvText => {
    database = Papa.parse(csvText, {header:true}).data;
    console.log("Database loaded:", database.length, "records");
  });

// Search function
document.getElementById("search").addEventListener("input", function() {
  let keyword = this.value.toLowerCase();
  let tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  database.forEach(row => {
    let procedure = row.Procedure?.toLowerCase() || "";
    let code = row.Code?.toLowerCase() || "";
    if(procedure.includes(keyword) || code.includes(keyword)) {
      let tr = document.createElement("tr");

      // Split codes by comma (or other delimiter if needed)
      let codes = row.Code ? row.Code.split(/[,;]/).map(c => c.trim()).join("<br>") : "";
      
      tr.innerHTML = "<td>" + row.Procedure + "</td><td>" + codes + "</td>";
      tbody.appendChild(tr);
    }
  });
});
</script>
